<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Global Lingua</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;520;540;580&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/rtl.css">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: var(--primary-bg);
            padding: 5rem 1rem 2rem 1rem;
            position: relative;
        }
        .auth-form-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--glass-border);
            position: relative;
        }
        @media (max-width: 768px) {
            .auth-form-wrapper { padding: 1.5rem; }
            .auth-container { padding: 5rem 1rem 2rem 1rem !important; }
            .login-helpers, .login-helpers label, .login-helpers a { font-size: 0.85rem !important; }
            .footer-text { font-size: 0.9rem; }
        }
        .fixed-toggles {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 9999;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--primary-bg);
            color: var(--text-primary);
            font-weight: 520;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-bottom: 1rem;
        }
        .social-btn:hover {
            background: var(--secondary-bg);
            border-color: var(--text-secondary);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: var(--text-secondary);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        .divider:not(:empty)::before { margin-right: 1rem; }
        .divider:not(:empty)::after { margin-left: 1rem; }
        
        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
</head>
<body>

    <svg class="svg-defs">
        <defs>
            <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#E8C779" />
                <stop offset="100%" stop-color="#A67B27" />
            </linearGradient>
            <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#5C6BC0" />
                <stop offset="100%" stop-color="#283593" />
            </linearGradient>
        </defs>
    </svg>


    <div class="fixed-toggles">
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle Dark Mode">☾</button>
        <button class="icon-btn" id="rtl-toggle" aria-label="Toggle RTL">⇄</button>
    </div>

    <div class="auth-container">
        <div class="auth-form-wrapper">
            <div class="auth-form-inner">
                
                <div style="display: flex; justify-content: center; margin-bottom: 2rem;">
                    <a href="index.html" class="navbar-logo" style="margin: 0;">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2"/>
                    <path d="M2 12H22M12 2C14.5013 4.73835 15.9228 8.29203 16 12C15.9228 15.708 14.5013 19.2616 12 22C9.49872 19.2616 8.07725 15.708 8 12C8.07725 8.29203 9.49872 4.73835 12 2Z" stroke="currentColor" stroke-width="2"/>
                </svg>
                        Global Lingua
                    </a>
                </div>

                <h2 style="margin-bottom: 0.5rem; text-align: center; font-size: 2rem;">Welcome back</h2>
                <p style="margin-bottom: 2rem; color: var(--text-secondary); text-align: center;">Log in to manage your translations and quotes.</p>

                <form>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" class="form-control" placeholder="••••••••" id="login-password">
                            <button type="button" class="password-toggle" onclick="togglePassword('login-password')">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>
                    <div class="login-helpers" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: nowrap; gap: 0.5rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); font-size: 0.95rem; cursor: pointer; white-space: nowrap;">
                            <input type="checkbox" style="width: 16px; height: 16px; flex-shrink: 0;"> Remember Me
                        </label>
                        <a href="#" style="font-size: 0.95rem; white-space: nowrap;">Forgot password?</a>
                    </div>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
                </form>

                <div class="divider">or continue with</div>

                <button class="social-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Continue with Google
                </button>
                <button class="social-btn" style="margin-bottom: 0;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.05 2.53.68 3.14.68.65 0 2.01-.76 3.55-.64 1.48.06 2.81.59 3.68 1.83-3.14 1.81-2.61 5.99.5 7.2-.68 1.63-1.54 3.07-2.87 3.9zm-3.32-14.2c.45-1.74-.29-3.48-1.58-4.58C11.13 2.5 9.4 1.94 8.7 3.65c-.53 1.68.3 3.5 1.6 4.54 1.05.85 2.58 1.34 3.43-.11z"/></svg>
                    Continue with Apple
                </button>

                <p class="footer-text" style="text-align: center; margin-top: 2rem; white-space: nowrap; display: flex; justify-content: center; gap: 0.25rem;">
                    Don't have an account? <a href="register.html">Sign up</a>
                </p>

            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }
    </script>
</body>
</html>
